<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ОГЭ Математика: Тест по уравнениям</title>
    <link rel="stylesheet" href="Project/style.css/">
</head>

<body>
    
    <div class="test-container" id="app">

        <!-- Шапка теста с заголовком и прогрессом -->
        <div class="test-header">
            <h1>Уравнения ОГЭ</h1>
            
            <p>Линейные, квадратные, рациональные — готовься к экзамену!</p>
            
            <div class="progress-badge" id="progressText">Вопрос 1 из 5</div>
        </div>
        
        <!-- Блок активного вопроса (динамический) -->
        <div id="questionSection" class="question-card">

            <!-- Контейнер для математического уравнения -->
            <div class="equation-box">
                <div class="equation" id="equationDisplay">x + 5 = 12</div>
            </div>

            <!-- Область ввода ответа -->
            <div class="input-area">
                <input type="text" id="answerInput" class="answer-field" 
                       placeholder="Введите ответ (число или дробь)" autocomplete="off">
                <div id="inputWarning" class="warning"></div>
            </div>
            
            <button id="nextButton" class="next-btn">➡ Продолжить</button>
        </div>
        
        <!-- Блок результатов (изначально скрыт) -->
        <div id="resultsSection" class="results-container hidden">
            <div class="result-title">Результаты тестирования</div>
            <div id="resultsList"></div>
            <button id="restartButton" class="restart-btn">Пройти тест заново</button>
            <div class="footer-info">Зелёный — верный ответ, Красный — ошибка</div>
        </div>
    </div>
    
    <script src="Project/logic.js/"></script>
</body>
</html>
